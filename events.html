<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events – STARS Stratford Animal Rescue Society</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  
  :root {
    --red: #B5261E;
    --yellow: #F5C518;
    --black: #111111;
    --white: #FAFAF8;
    --grey: #F2F0ED;
    --dark: #1A1A1A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "DM Sans", sans-serif; background: var(--white); color: var(--black); overflow-x: hidden; }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 48px;
    background: rgba(250,250,248,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,0,0,0.07);
  }
  .nav-logo { height: 52px; display: block; }
  .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
  .nav-links a { text-decoration: none; color: var(--black); font-size: 13.5px; font-weight: 500; opacity: 0.65; transition: opacity 0.2s; }
  .nav-links a:hover { opacity: 1; }
  .nav-ctas { display: flex; gap: 8px; }
  .btn-adopt { background: var(--yellow); color: var(--black); padding: 9px 20px; border-radius: 100px; font-size: 12px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
  .btn-donate { background: var(--red); color: white; padding: 9px 20px; border-radius: 100px; font-size: 12px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
  .btn-adopt:hover, .btn-donate:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
  .page-hero {
    margin-top: 76px; background: var(--black); padding: 80px; text-align: center;
  }
  .page-hero .tag { display: inline-block; background: var(--yellow); color: var(--black); padding: 5px 14px; border-radius: 100px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; }
  .page-hero h1 { font-family: "Playfair Display", serif; font-size: clamp(40px, 5vw, 64px); font-weight: 900; color: white; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 16px; }
  .page-hero h1 em { font-style: italic; color: var(--yellow); }
  .page-hero p { color: rgba(255,255,255,0.7); font-size: 17px; max-width: 560px; margin: 0 auto; line-height: 1.65; }
  .section-tag { font-size: 10.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--red); margin-bottom: 12px; }
  footer { background: var(--dark); padding: 60px 80px 36px; color: rgba(255,255,255,0.55); }
  .footer-top { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 44px; margin-bottom: 44px; padding-bottom: 44px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .footer-logo { height: 48px; margin-bottom: 12px; display: block; opacity: 0.9; filter: none; }
  .footer-brand p { font-size: 13.5px; line-height: 1.72; max-width: 260px; }
  .footer-col h4 { color: white; font-size: 11px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; margin-bottom: 14px; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .footer-col a { color: rgba(255,255,255,0.48); text-decoration: none; font-size: 13.5px; transition: color 0.2s; }
  .footer-col a:hover { color: white; }
  .footer-bottom { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; flex-wrap: wrap; gap: 8px; }
  .footer-social a { color: rgba(255,255,255,0.48); text-decoration: none; font-size: 13px; transition: color 0.2s; margin-left: 16px; }
  .footer-social a:hover { color: white; }
  @media (max-width: 768px) {
    nav { padding: 12px 20px; }
    .nav-links { display: none; }
    .page-hero { padding: 60px 24px; }
    footer { padding: 40px 24px 24px; }
    .footer-top { grid-template-columns: 1fr 1fr; gap: 32px; }
    .footer-bottom { flex-direction: column; text-align: center; }
  }


  .events-content { padding: 80px; max-width: 1200px; margin: 0 auto; }

  .events-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-bottom: 80px; }
  .ecard { background: white; border: 1px solid rgba(0,0,0,0.08); border-radius: 4px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; color: inherit; display: block; }
  .ecard:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
  .ecard img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .ecard-body { padding: 28px; }
  .ecard-date { font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); margin-bottom: 8px; }
  .ecard-body h3 { font-family: "Playfair Display", serif; font-size: 22px; font-weight: 700; margin-bottom: 10px; line-height: 1.2; }
  .ecard-body p { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 20px; }
  .ecard-tag { display: inline-block; background: var(--yellow); color: var(--black); padding: 8px 20px; border-radius: 100px; font-size: 12px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
  .ecard-tag:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }

  .donate-strip { background: var(--red); padding: 80px; text-align: center; }
  .donate-strip h2 { font-family: "Playfair Display", serif; font-size: clamp(32px, 4vw, 52px); font-weight: 900; color: white; line-height: 1.1; margin-bottom: 14px; letter-spacing: -0.02em; }
  .donate-strip h2 em { font-style: italic; color: var(--yellow); }
  .donate-strip p { color: rgba(255,255,255,0.72); font-size: 16px; margin-bottom: 32px; max-width: 480px; margin-left: auto; margin-right: auto; line-height: 1.62; }
  .btn-give { display: inline-block; background: var(--yellow); color: var(--black); padding: 15px 36px; border-radius: 100px; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
  .btn-give:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.2); }

  @media (max-width: 768px) {
    .events-content { padding: 40px 24px; }
    .events-grid { grid-template-columns: 1fr; }
    .donate-strip { padding: 60px 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/">
